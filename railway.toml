[build]
dockerfilePath = "backend/Dockerfile"
# Build context is the project root so both backend/ and frontend/ are accessible

[[services]]
name = "backend"

[services.deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30

[[services]]
name = "celery-worker"

[services.deploy]
startCommand = "celery -A app.celery_app worker --loglevel=info -c 2"
