server {
    listen 80;
    server_name crm.ntcplai.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name crm.ntcplai.com;

    ssl_certificate /etc/letsencrypt/live/crm.ntcplai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.ntcplai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # Backend serves both the API and the built React SPA (see Dockerfile.prod),
    # so nginx here only needs to terminate TLS and proxy everything through.
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
